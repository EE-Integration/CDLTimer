name: Docker Build and Deploy

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  REGISTRY_HOST: 127.0.0.1:5000
  PORTAINER_STACK_WEBHOOK: https://10.24.1.43:9443/api/stacks/webhooks/65c3415e-e1ba-4f88-95fa-64755566febd

jobs:
  build-and-push:
    runs-on: [self-hosted, ctr1, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY,,}"
          HOST="${REGISTRY_HOST}"
          HOST="${HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%/}"

          echo "SHA_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${HOST}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "HOST=${HOST}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -t "${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.SHA_TAG }}" \
            -t "${{ steps.meta.outputs.IMAGE }}:latest" \
            .

      - name: Push
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.SHA_TAG }}"
          docker push "${{ steps.meta.outputs.IMAGE }}:latest"

      - name: Trigger Portainer stack webhook
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -e WEBHOOK_URL="${PORTAINER_STACK_WEBHOOK}" \
            "${{ steps.meta.outputs.IMAGE }}:${{ steps.meta.outputs.SHA_TAG }}" \
            node -e '
              const https = require("https");
              const webhook = process.env.WEBHOOK_URL;
              if (!webhook) {
                console.error("PORTAINER_STACK_WEBHOOK is not set");
                process.exit(1);
              }

              const url = new URL(webhook);
              const req = https.request(
                {
                  protocol: url.protocol,
                  hostname: url.hostname,
                  port: url.port || 443,
                  path: url.pathname + url.search,
                  method: "POST",
                  rejectUnauthorized: false
                },
                (res) => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    process.exit(0);
                  }
                  console.error(`Webhook failed with status ${res.statusCode}`);
                  process.exit(1);
                }
              );

              req.on("error", (err) => {
                console.error("Webhook request error:", err.message);
                process.exit(1);
              });

              req.end();
            '
